server:
  port: 8080
spring:
  main:
    web-application-type: none
    banner-mode: false
  application:
    name: AIgenie
  ai:
    openai:
      api-key: sk-
      base-url: https://api.siliconflow.cn/v1
      chat:
        options:
          model: Pro/deepseek-ai/DeepSeek-V3
          temperature: 0.7
          max-tokens: 2000
logging:
  level:
    root: INFO
    # 默认 INFO，仅记录消息长度等结构化信息，不会把用户原文写入日志文件。
    # 调试时可以临时改为 DEBUG，但注意 DEBUG 会把用户输入和请求/响应体打到 logs/aigenie.log。
    com.aIgenie: INFO
    org.springframework.ai: INFO
    org.springframework.web.client: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
  file:
    name: ./logs/aigenie.log
aigenie:
  system-prompt: 你是一个有用的AI助手，名为'AIgenie'。请简洁明了地回答用户的问题。
  chat-history-limit: 10
  use-custom-client: true
  theme: 浅色
  docking-enabled: true
  http:
    # 自定义客户端的网络超时（秒），避免 API 卡住时输入框永久禁用
    connect-timeout-seconds: 10
    read-timeout-seconds: 60
shell:
  interactive:
    enabled: false
